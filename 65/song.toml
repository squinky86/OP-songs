[lyrics.1]
text = "A -- wake, and sing the song Of Mo -- ses and the Lamb; Tune eve -- ry heart and eve -- ry tongue To praise the Sa -- vior's name."

[lyrics.2]
text = "Sing of His dy -- ing love; Sing of His ris -- ing power; Sing how He in -- ter -- cedes a -- bove For those whose sins He bore."

[lyrics.3]
text = "Tell, in se -- ra -- phic strains, What He has done for you; How He has tak -- en off your chains And formed your hearts a -- new."

[lyrics.4]
text = "His faith -- ful -- ness pro -- claim While life to you is given: Join hands and hearts to praise His name Till we all meet in heav'n."
