[lyrics.1]
text = "The world has lost the right of prayer, And saints have failed to pray; What loss sus -- tained be -- yond re -- pair! How blind of heart are they!"

[lyrics.2]
text = "The Fa -- ther speak -- eth in His word— He talks no oth -- er way! And to con -- verse with Him, our ord, We must take time to pray!"

[lyrics.3]
text = "There is no tri -- al, grief, or pain, No mo -- ment of the day, But that we may in Je -- sus' name In -- cline our souls and pray!"

[lyrics.chorus]
text = "Pray in the Morn -- ing, Pray at the Noon -- time, Pray in the Eve -- ning, Pray an -- y -- time; Pray when you're hap -- py, Pray when in sor -- row, Pray when you're temp -- ted, Pray all the time."
