[lyrics.1]
text = "Kneel at the cross, Christ will meet you there, He in -- ter -- cedes for you; List to His voice, Leave with Him your care And be -- gin life a -- new."

[lyrics.2]
text = "Kneel at the cross, There is room for all Who would His glo -- ry share; Bliss there a -- waits, Harm can ne’er be -- fall Those who are an -- chored there."

[lyrics.3]
text = "Kneel at the cross, Give your i -- dols up, Look un -- to realms a -- bove; Turn not a -- way To life’s spark -- ling cup, Trust on -- ly in His love."

[lyrics.chorus]
text = "Kneel at the cross, Leave eve -- ry care; Kneel at the cross, Je -- sus will meet you there."

