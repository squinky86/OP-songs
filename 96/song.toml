[lyrics.1]
text = "When with the Sav -- ior we en -- ter the glo -- ry -- land, Won't it be won -- der -- ful there? End -- ed the trou -- bles and cares of the sto -- ry -- land, Won't it be won -- der -- ful there?"

[lyrics.2]
text = "Walk -- ing and talk -- ing with Christ, the su -- per -- nal One, Won't it be won -- der -- ful there? Prais -- ing, a -- dor -- ing the match -- less e -- ter -- nal One, Won't it be won -- der -- ful there?"

[lyrics.3]
text = "There where the tem -- pest will nev -- er be sweep -- ing us, Won't it be won -- der -- ful there? Sure that for -- ev -- er the Lord will be keep -- ing us, Won't it be won -- der -- ful there?"

