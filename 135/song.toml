[lyrics.1]
text = "Sow -- ing in the morn -- ing, sow -- ing seeds of kind -- ness, Sow -- ing in the noon -- tide and the dew -- y eve; Wait -- ing for the har -- vest, and the time of reap -- ing, @s1"

[lyrics.2]
text = "Sow -- ing in the sun -- shine, sow -- ing in the sha -- dows, Fear -- ing nei -- ther clouds nor win -- ter’s chill -- ing breeze; By and by the har -- vest, and the la -- bor end -- ed, @s1"

[lyrics.3]
text = "Go -- ing forth with weep -- ing, sow -- ing for the Mas -- ter, Though the loss sus -- tained our spir -- it of -- ten grieves; When our weep -- ing’s o -- ver, He will bid us wel -- come, @s1"

[lyrics.s1]
text = "We shall come re -- joic -- ing, bring -- ing in the sheaves."

