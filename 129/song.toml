[lyrics.1]
text = "King of my life, I crown Thee now, Thine shall the glo -- ry be; Lest I for -- get Thy thorn -- crowned brow, Lead me to Cal -- va -- ry."

[lyrics.2]
text = "Show me the tomb where Thou wast laid, Ten -- der -- ly mourned and wept; An -- gels in robes of light ar -- rayed Guard -- ed Thee whilst Thou slept."

[lyrics.3]
text = "Let me like Mar -- y, through the gloom, Come with a gift to Thee; Show to me now the emp -- ty tomb, Lead me to Cal -- va -- ry."

[lyrics.4]
text = "May I be will -- ing, Lord, to bear Dail -- y my cross for Thee; E -- ven Thy cup of grief to share, Thou hast borne all for me."

[lyrics.chorus]
text = "Lest I for -- get Geth -- sem -- a -- ne, Lest I for -- get Thine ag -- o -- ny; Lest I for -- get Thy love for me, Lead me to Cal -- va -- ry."
