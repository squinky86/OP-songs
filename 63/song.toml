[lyrics.1]
text = "My hope is built on noth -- ing less than Je -- sus' blood and right -- eous -- ness; I dare not trust the sweet -- est frame, but whol -- ly lean on Je -- sus' name."

[lyrics.2]
text = "When dark -- ness veils his love -- ly face, I rest on his un -- chang -- ing grace; in ev -- ery high and storm -- y gale, my an -- chor holds with -- in the veil."

[lyrics.3]
text = "His oath, his cov -- e -- nant, his blood, sup -- port me in the whelm -- ing flood; when all a -- round my soul gives way, he then is all my hope and stay."

[lyrics.4]
text = "When he shall come with trum -- pet sound, O may I then in him be found: dressed in his right -- eous -- ness a -- lone, fault -- less to stand be -- fore the throne."

[lyrics.chorus]
text = "On Christ, the sol -- id Rock, I stand; All o -- ther ground is sink -- ing sand, All o -- ther ground is sink -- ing sand."
