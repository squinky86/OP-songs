[lyrics.1]
text = "Re -- deemed by blood, the work of love, A -- maz -- ing truth, the blood of One Whose place was right -- ful -- ly a -- bove, Co -- e -- qual on the Fa -- ther’s throne."

[lyrics.2]
text = "No vic -- tim of in -- fe -- rior worth Could ward the stroke that jus -- tice aimed; For none but He, in heav’n or earth, Could of -- fer that which jus -- tice claimed."

[lyrics.3]
text = "But He, the Lord of glo -- ry, came, Up -- on the cross He bowed His head; He suf -- fered pain, He suf -- fered shame, And lay a pris -- ’ner with the dead."

[lyrics.4]
