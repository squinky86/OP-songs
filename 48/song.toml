[lyrics.1]
text = "An -- gels are sing -- ing re -- demp -- tion's sweet song, Won -- der -- ful theme, glo -- ri -- ous theme! Shout the glad mes -- sage and join in the throng, Sing -- ing re -- demp -- tion's song!"

[lyrics.2]
text = "O -- ver and o -- ver the mel -- o -- dies ring, Won -- der -- ful theme, glo -- ri -- ous theme! Heav -- en re -- sounds with the trib -- ute they bring, Sing -- ing re -- demp -- tion's song!"

[lyrics.3]
text = "Joy be -- yond mea -- sure a -- waits us up there, Won -- der -- ful theme, glo -- ri -- ous theme! Soon we shall join with the an -- gels so fair, Sing -- ing re -- demp -- tion's song!"

[parts.Soprano.lyrics.chorus]
text = "Sing the sweet sto -- ry— re -- demp -- tion's sweet song; o -- ver and o -- ver the cho -- rus pro -- long; Shout the glad mes -- sage and join with the throng, Ev -- er we'll sing praise to the King, Sing -- ing re -- demp -- tion's song."

