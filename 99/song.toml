[lyrics.1]
text = "In Thy field I would wield sic -- kles brave and true, In the fight for the right I would dare and do, Spend my days in Thy praise all the jour -- ney thru, Let me live close to Thee each day."

[lyrics.2]
text = "Not the crown nor re -- nown that the world might see, I would work, nev -- er shirk, bless -- ed Lord, for Thee, But to know where I go that my soul is free, Let me live close to Thee each day."

[lyrics.3]
text = "Help me bear and to share some poor pil -- grim's load, Be my friend to the end of the toil -- some road, I would sing to my King in the soul's a -- bode, Let me live close to Thee each day."

[lyrics.chorus]
text = "Let me live close to Thee, Guide me all a -- long the way; Let me live close to Thee, Let me walk close to Thee each day."

[parts.Alto.lyrics.chorus]
text = "Let me live close to Thee, Take my hand, dear Lord, and guide me all a -- long the rug -- ged way; O let me live close to Thee, Let me walk and talk with Thee, dear Lord, each day."
