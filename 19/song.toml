[lyrics.1]
text = "Great is Thy faith -- ful -- ness, O God my Fa -- ther; There is no sha -- dow of turn -- ing with Thee; Thou chan -- gest not, Thy com -- pas -- sions, they fail not; As Thou hast been, Thou for -- ev -- er will be."

[lyrics.2]
text = "Sum -- mer and win -- ter and spring -- time and har -- vest, Sun, moon and stars in their cour -- ses a -- bove Join with all na -- ture in man -- i -- fold wit -- ness To Thy great faith -- ful -- ness, mer -- cy and love."

[lyrics.3]
text = "Par -- don for sin and a peace that en -- du -- reth Thine own dear pres -- ence to cheer and to guide; Strength for to -- day and bright hope for to -- mor -- row, Bless -- ings all mine, with ten thou -- sand be -- side!"

[lyrics.chorus]
text = "Great is Thy faith -- ful -- ness! Great is Thy faith -- ful -- ness! Mor -- ning by mor -- ning new mer -- cies I see. All I have nee -- ded Thy hand hath pro -- vi -- ded; Great is Thy faith -- ful -- ness, Lord, un -- to me!"
