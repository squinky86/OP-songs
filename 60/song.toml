[lyrics.1]
text = "Be -- hold, be -- hold the Lamb of God _ On the cross! On the cross! For us He shed His pre -- cious blood _ On the cross! On the cross! Oh hear His all- im -- port -- ant cry― \"Why per -- ish, blood- bought sin -- ner, why?\" Draw near and see the Sav -- iour die On the cross! On the cross!"

[lyrics.2]
text = "Be -- hold His arms ex -- tend -- ed wide _ On the cross! On the cross! Be -- hold His bleed -- ing hands and side _ On the cross! On the cross! The sun with -- holds his rays of light, The heav'ns are clothed in shades of night; While Je -- sus wins the glo -- rious fight On the cross! On the cross!"

[lyrics.3]
text = "Come, sin -- ners, see Him lift -- ed up _ On the cross! On the cross! He drinks for you the bit -- ter cup _ On the cross! On the cross! The rocks do rend, the moun -- tains quake, While Je -- sus doth a -- tone -- ment make, While Je -- sus suf -- fers for our sake, On the cross! On the cross!"

[lyrics.4]
text = "And now the might -- y deed is done _ On the cross, On the cross; The ba -- ttle’s fought, the vic -- 'try’s won _ On the cross, On the cross. To heav'n He turns His dy -- ing eyes; ‘Tis fin -- ished! now the con -- qu'ror cries; Then bows his sac -- red head and dies On the cross, On the cross."

[lyrics.5]
text = "Wher -- e'er I go I'll tell the sto -- ry Of the cross! Of the cross! In noth -- ing else my soul shall glo -- ry, Save the cross! Save the cross! Yes; this my con -- stant theme shall be, Thro' time, and in e -- ter -- ni -- ty, That Je -- sus tast -- ed death for me On the cross! On the cross!"
