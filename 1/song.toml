[lyrics.1]
text = "A -- bide with me; fast falls the e -- ven -- tide; The dark -- ness deep -- ens; Lord with me a -- bide When oth -- er help -- ers fail and com -- forts flee, Help of the help -- less, O a -- bide with me."

[lyrics.2]
text = "Swift to its close ebbs out life's lit -- tle day; Earth's joys grow dim; its glo -- ries pass a -- way; Change and de -- cay in all a -- round I see; O Thou who chang -- est not, a -- bide with me."

[lyrics.3]
text = "Thou on my head in ear -- ly youth didst smile; And, though re -- bel -- lious and per -- verse mean -- while, Thou hast not left me, oft as I left Thee, On to the close, O Lord, a -- bide with me."

[lyrics.4]
text = "I need Thy pres -- ence ev -- ery pass -- ing hour; What but Thy grace can foil the tempt -- er's power? Who, like Thy -- self, my guide and stay can be? Through cloud and sun -- shine, Lord, a -- bide with me."

[lyrics.5]
text = "I fear no foe, with Thee at hand to bless; Ills have no weight, and tears no bit -- ter -- ness Where is death's sting? Where, grave, thy vic -- tor -- y? I tri -- umph still, if Thou a -- bide with me."

[lyrics.6]
text = "Hold Thou Thy cross be -- fore my clos -- ing eyes; Shine through the gloom and point me to the skies Heaven's morn -- ing breaks, and earth's vain shad -- ows flee; In life, in death, O Lord, a -- bide with me."
