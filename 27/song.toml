[lyrics.1]
text = "At the feast of Bel -- shaz -- zar and a thou -- sand of his lords, While they drank from gold -- en ves -- sels, as the Book of Truth re -- cords, In the night, as they re -- veled in the roy -- al pal -- ace hall, They were seized with con -- ster -- na -- tion— ’twas the Hand up -- on the wall!"

[lyrics.2]
text = "See the brave cap -- tive, Dan -- iel, as he stood be -- fore the throng, And re -- buked the haught -- y mon -- arch for his might -- y deeds of wrong; As he read out the writ -- ing— ’twas the doom of one and all, For the king -- dom now was fin -- ished— said the Hand up -- on the wall!"

[lyrics.3]
text = "See the faith, zeal and cour -- age, that would dare to do the right, Which the Spir -- it gave to Dan -- iel— ’twas the sec -- ret of his might, In his home in Ju -- de -- a, or a cap -- tive in the hall, He _ un -- der -- stood the writ -- ing of his God up -- on the wall!"

[lyrics.4]
text = "So our deeds are re -- cord -- ed— there’s a Hand that's writ -- ing now: Sin -- ner, give your heart to Je -- sus, to His roy -- al man -- dates bow; For the day is ap -- proach -- ing— it must come to one and all, When the sin -- ners' con -- demn -- a -- tion will be writ -- ten on the wall!"


[lyrics.chorus]
text = "’Tis the hand of God on the wall, ’Tis the hand of God on the wall; Shall the rec -- ord be, “Found want -- ing,” or shall it be, “Found trust -- ing!” While that hand is writ -- ing on the wall."

[parts.Alto.lyrics.chorus]
text = "’Tis the hand of God on the wall, on the wall! ’Tis the hand of God on the wall; on the wall; Shall the rec -- ord be, “Found want -- ing,” or shall it be, “Found trust -- ing!” While that hand is writ -- ing on the wall, on the wall."

