[lyrics.1]
text = "Bring Christ your bro -- ken life, So marred by sin, He will cre -- ate a -- new, Make whole a -- gain; Your emp -- ty, wast -- ed years He will re -- store, And your in -- i -- qui -- ties Re -- mem -- ber no more."

[lyrics.2]
text = "Bring Him your ev -- 'ry care If great or small— What -- ev -- er trou -- bles you— O bring it all! Bring Him the haunt -- ing fears, The name -- less dread, Thy heart He will re -- lieve, And lift up thy head."

[lyrics.3]
text = "Bring Him your wea -- ri -- ness, Re -- ceive His rest; Weep out your blind -- ing tears Up -- on His breast; His love is won -- der -- ful, His pow'r is great, \"And none that trust in Him Shall be des -- o -- late.\""

[lyrics.4]
text = "Blest Sav -- ior of us all! Al -- might -- y Friend! His pres -- ence shall be ours Un -- to the end; With -- out Him life would be How dark, how drear! But with Him morn -- ing breaks— And heav -- en is near!"
