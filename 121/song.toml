[lyrics.1]
text = "What can wash a -- way my sin? @s1 What can make me whole a -- gain? @s2"

[lyrics.2]
text = "For my par -- don, this I see, @s1 For my cleans -- ing this my plea, @s2"

[lyrics.3]
text = "Noth -- ing can for sin a -- tone, @s1 Naught of good that I have done, @s2"

[lyrics.4]
text = "This is all my hope and peace, @s1 This is all my right -- eous -- ness, @s2"

[lyrics.5]
text = "Now by this I’ll o -- ver -- come— @s1 Now by this I’ll reach my home— @s2"

[lyrics.6]
text = "Glo -- ry! Glo -- ry! This I sing— @s1 All my praise for this I bring— @s2"

[lyrics.s1]
text = "Noth -- ing but the blood of Je -- sus;"

