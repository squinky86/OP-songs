[lyrics.1]
text = "As the ser -- pent raised by Mos -- es Healed the fier -- y ser -- pent's bite, Je -- sus now Him -- self dis -- clos -- es To the wound -- ed sin -- ner's sight. Hear His gra -- cious in -- vi -- ta -- tion, \"I have life and peace to give, I have wrought out full sal -- va -- tion, Sin -- ner, look to Me and live.\""

[lyrics.2]
text = "\"Grieve a -- bout your sins no lon -- ger, Well I know their might -- y guilt; But My love than death is stron -- ger, I My pre -- cious blood have spilt: Tho' your heart has long been har -- dened, Look on Me— it soft shall grow; Your trans -- gres -- sions shall be par -- doned, And I'll wash you white as snow.\""

[lyrics.3]
text = "\"I have seen what you were do -- ing, Tho' you lit -- tle thought of Me; You were mad -- ly bent on ru -- in, But, I said― it shall not be; You had been for -- ev -- er wretch -- ed, Had I not es -- poused your part; Now be -- hold My arms out -- stretch -- ed To re -- ceive you to My heart.\""
