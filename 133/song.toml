[lyrics.1]
text = "To hail Thy ris -- ing Sun of life, The gath -- 'ring na -- tions come, Joy -- ous as when the reap -- ers bear Their har -- vest treas -- ures home."

[lyrics.2]
text = "For Thou our bur -- dens hast re -- moved, Th'op -- pres -- sor's reign is broke; Thy fie -- ry con -- flict with the foe Has burst his cru -- el yoke."

[lyrics.3]
text = "“To us the pro -- mised Child is born, To us the Son is giv'n; Him shall the tribes of earth o -- bey, And all the hosts of heav'n.”"

[lyrics.4]
text = "His pow'r in -- creas -- ing still shall spread, his reign no end shall know; Jus -- tice shall guard His throne a -- bove, And peace a -- bound be -- low."

[lyrics.chorus]
text = "His Name shall be, His Name shall be the Prince of Peace, His Name shall be the Prince of Peace For -- ev -- er -- more a -- dored, The Won -- der -- ful, the Coun -- sel -- lor, The migh -- ty God and Lord."

[parts.Tenor.lyrics.chorus]
text = "His Name shall be, His Name shall be the Prince of Peace, The Prince of Peace, the Prince, the Prince of Peace, Prince, the Prince, the Prince, the Prince of Peace."

[parts.Bass.lyrics.chorus]
text = "His Name shall be, His Name shall be the Prince of Peace, ​The Prince of Peace, ​the Prince of Peace, ​the Prince of Peace, the Prince of Peace."
