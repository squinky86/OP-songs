[lyrics.1]
text = "Though I, thro' the val -- ley of shad -- ow, O'er moun -- tain or trou -- bled sea, And oft in the dark -- ness have trav -- elled, The Lord has been mind -- ful of me!"

[lyrics.2]
text = "Much more than my grief and my sor -- row, Much more than ad -- ver -- si -- ty, Much more than the all I have giv -- en, The Lord has been mind -- ful of me!"

[lyrics.3]
text = "I'm rich! I am saved! I am hap -- py! I've health and pros -- per -- i -- ty! I've friends! I have doors ev -- er o -- pen! The Lord has been mind -- ful of me!"

[lyrics.chorus]
text = "The Lord has been mind -- ful of me! He bless -- es and bless -- es a -- gain! My God is the God of the liv -- ing! How ex -- cel -- lent is His name!"

