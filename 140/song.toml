[lyrics.1]
text = "Christ the Lord is ris'n to -- day, @s1 Sons of men and an -- gels say: @s1 Raise your joys and tri -- umphs high. @s1 Sing, ye heav'ns, and earth re -- ply: @s1"

[lyrics.2]
text = "Love's re -- deem -- ing work is done. @s1 Fought the fight, the bat -- tle won. @s1 Death in vain for -- bids Him rise. @s1 Christ has o -- pened par -- a -- dise. @s1"

[lyrics.3]
text = "Lives a -- gain, our glo -- rious King. @s1 Where, O death, is now thy sting? @s1 Dy -- ing once, He all doth save. @s1 Where thy vic -- to -- ry, O grave? @s1"

[lyrics.4]
text = "Soar we now where Christ has led. @s1 Fol -- l'wing our ex -- alt -- ed Head. @s1 Made like Him, like Him we rise. @s1 Ours the cross, the grave, the skies. @s1"

[lyrics.5]
text = "Hail, the Lord of earth and heav'n! @s1 Praise to Thee by both be giv'n; @s1 Thee we greet tri -- um -- phant now; @s1 Hail, the Res -- ur -- rec -- tion Thou! @s1"

[lyrics.s1]
text = "Al -- le -- lu -- ia!"
