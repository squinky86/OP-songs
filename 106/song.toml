[lyrics.1]
text = "“Come un -- to Me.” It is the Sav -- iour’s voice— The Lord of life, who bids thy heart re -- joice; O wear -- y heart, with heav -- y cares op -- pressed, “Come un -- to Me,” and I will give you rest."

[lyrics.2]
text = "Wear -- y with life’s long strug -- gle, full of pain, O doubt -- ing soul, thy Sav -- iour calls a -- gain; Thy doubts shall van -- ish, and thy sor -- rows cease: “Come un -- to Me,” and I will give you peace."

[lyrics.3]
text = "O dy -- ing man, with guilt and sin dis -- mayed, With con -- science wak -- ened, of thy God a -- fraid; ’Twixt hopes and fears— oh, end the anx -- ious strife! “Come un -- to Me,” and I will give you life."

[lyrics.4]
text = "Life, rest and peace, the flow’rs of death -- less bloom, The Sav -- iour gives us— not be -- yond the tomb, But here, and now, on earth, the taste is giv’n Of joys which wait us thro’ the gates of heaven."

[lyrics.chorus]
text = "“Come un -- to Me,” “Come un -- to Me,” “Come un -- to Me, and I will give you rest,” I will give you rest, I will give you rest."

[parts.Alto.lyrics.chorus]
text = "“Come un -- to Me,” “Come un -- to Me,” “Come un -- to Me, and I will give you rest,” I will give you rest, I will give will give you rest."

[parts.Tenor.lyrics.chorus]
text = "“Come un -- to Me,” “Come un -- to Me,” “Come un -- to Me, and I will give you rest,” I will give will give you rest, I will give will give you rest."

[parts.Bass.lyrics.chorus]
