[lyrics.1]
text = "God loved the world of sin -- ners lost And ru -- ined by the fall; Sal -- va -- tion full, at high -- est cost, He of -- fers free to all."

[lyrics.2]
text = "E’en now by faith I claim Him mine, The ris -- en Son of God; Re -- demp -- tion by His death I find, And cleans -- ing through the blood."

[lyrics.3]
text = "Love brings the glo -- rious full -- ness in, And to the lost makes known Sal -- va -- tion from the pow’r of sin, Through faith in Christ a -- lone."

[lyrics.4]
text = "Be -- liev -- ing souls, re -- joic -- ing go. There shall to you be giv'n A glo -- rious fore -- taste, here be -- low, Of end -- les life in heav'n."

[lyrics.5]
text = "Of vic -- t'ry now o'er Sa -- tan's pow'r, Let all the ran -- somed sing And tri -- umph in the dy -- ing hour, Thro' Christ, the Lord, our King."

[lyrics.chorus]
text = "O 'twas love, 'twas won -- drous love, The love of God to me; It brought my Sav -- iour from a -- bove, To die on Cal -- va -- ry!"
