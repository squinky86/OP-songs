[lyrics.1]
text = "Be not dis -- mayed what -- e’er be -- tide, God will take care of you; Be -- neath His wings of love a -- bide, God will take care of you."

[lyrics.2]
text = "Through days of toil when heart doth fail, God will take care of you; When dan -- gers fierce your path as -- sail, God will take care of you."

[lyrics.3]
text = "All you may need He will pro -- vide, God will take care of you; No -- thing you ask will be de -- nied, God will take care of you."

[lyrics.4]
text = "No mat -- ter what may be the test, God will take care of you; Lean, wear -- y one, up -- on His breast, God will take care of you."

[lyrics.chorus]
text = "God will take care of you, Through ev -- 'ry day, o'er all the way; He will take care of you, God will take care of you."

