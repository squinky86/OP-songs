[lyrics.1]
text = """
A -- bide in me, O Lord, and I in Thee,
From this good hour, oh, leave me nev -- er -- more;
Then shall the dis -- cord cease, the wound be healed,
The life -- long bleed -- ing of the soul be o'er.
"""

[lyrics.2]
text = """
A -- bide in me; o'er -- shad -- ow by Thy love
Each half formed pur -- pose and dark thought of sin;
Quench ere it rise each self -- ish, low de -- sire,
And keep my soul as Thine, calm and di -- vine.
"""

[lyrics.3]
text = """
As some rare per -- fume in a vase of clay,
Per -- vades it with a fra -- grance not its own,
So, when Thou dwel -- lest in a mor -- tal soul,
All Heav'n's own sweet -- ness seems a -- round it thrown.
"""

[lyrics.4]
text = """
A -- bide in me; there have been mo -- ments blest
When I have heard Thy voice and felt Thy power;
Then e -- vil lost its grasp; and pas -- sion, hushed,
Owned the di -- vine en -- chant -- ment of the hour.
"""

[lyrics.5]
text = """
These were but sea -- sons beau -- ti -- ful and rare;
A -- bide in me, and they shall ev -- er be;
Ful -- fill at once Thy pre -- cept and my prayer,
Come, and a -- bide in me, and I in Thee.
"""
