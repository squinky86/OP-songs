# The tenor sings the verse-specific lines with everyone (inherited from the
# global [lyrics.N]); only the call-and-response lines differ, so only the
# shared sections are overridden here.
[parts.Tenor.lyrics.s1]
text = "Free -- ly bore it all I with Him might live;"

[parts.Tenor.lyrics.chorus]
text = "Je -- sus bore it all, see His shin -- ing face, Free -- ly bore it all, I with Him might live; Stood con -- demned to die, free -- ly took my place, All that I might in His pres -- ence live."

[parts.Bass]
choral_type = "bass"
clef = "bass"
staff_number = 2
notes = """
s2 s8 f8 f8 f8 | f4 f4 f4 c4 | d8 d8 d8 c8 f8 r4. | f8 f8 f8 f8 f8 r4. | g8 g8 g8 g8 c8 c8 d8 e8 | f4 f4 f4 c4 | d8 d8 d8 c8 f8 a8 g8 f8 | e4/+24 c4/+24 d4/+24 e4/+24 | f2/+24~ f8 r4.@c | f8 f8 f8 f8 f8 r4. | f8 f8 c8 c8 d8 c8 d8 c8 | g2~ g8 c8 d8 c8 | f2~ f8 r4. | f8 f8 f8 f8 f8 r4. | f8 f8 g8 g8 g8 a8 g8 f8 | e4/+24 c4/+24 d4/+24 e4/+24 | f2/+24~ f8 s4 s8
"""

# The bass answers on the beat where the tenor echoes off it (m8/m9 and
# m16/m17); the /+24 offsets shift its dedup fingerprint one eighth so the
# shared response text collapses into the tenor's row.
[parts.Bass.lyrics.s1]
text = "Free -- ly bore it all I with Him might live;"

[parts.Bass.lyrics.s2]
text = "He bore it all that I might live"

[parts.Bass.lyrics.chorus]
text = "Je -- sus bore it all, see His shin -- ing face, He bore it all that I might live; Stood con -- demned to die, free -- ly took my place, He bore it all that I might live."

# Lines 2 and 4 of every verse are the same call-and-response, printed once:
# the shared sections below are spliced in at @s1/@s2 and converge across
# verses in the PDF (rows 2/3 skip them; slides and the web keep full text).
[lyrics.1]
text = "My pre -- cious Sav -- ior suf -- fered pain and ag -- o -- ny, @s1 He broke the bonds of sin and set the cap -- tive free, @s2"

[lyrics.2]
text = "They placed a crown of thorns up -- on my Sav -- ior’s head, @s1 By cru -- el man with spear His side was pierced and bled, @s2"

[lyrics.3]
text = "Up Cal -- v’ry’s hill in shame the bless -- ed Sav -- ior trod, @s1 Be -- tween two thieves they cru -- ci -- fied the Son of God, @s2"

[lyrics.s1]
text = "He bore it all that I might live;"

[lyrics.s2]
text = "All that I might in His pres -- ence live."

[lyrics.chorus]
text = "He bore it all that I might see His shin -- ing face, Free -- ly bore it all, I with Him might live; I stood con -- demned to die, But Je -- sus took my place, All that I might in His pres -- ence live."
