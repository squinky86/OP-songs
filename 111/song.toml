[lyrics.1]
text = "O church of God tri -- umph -- ant O'er hu -- man doubts and fears, Which in the faith of a -- ges Comes march -- ing thro' the years; Bap -- tized with blood of mar -- tyrs, With con -- flicts dear -- ly won, Be -- set with per -- se -- cu -- tions, Yet ev -- er march -- ing on."

[lyrics.2]
text = "With back -- ward look we see thee, Thy scatt -- ered mem -- bers few; We see thee strug -- gling ev -- er Their cour -- age to re -- new; Strong a mid trib -- u -- la -- tion, Up -- ris -- ing from each fall, We see thee march -- ing on -- ward Tri umph -- ant o -- ver all."

[lyrics.3]
text = "O ref -- uge of the na -- tions, On thee our hope is stayed; Thy cour -- age thro' the a -- ges Shall keep us un -- a -- fraid, And with thy strength in -- creas -- ing Till earth -- ly years are past, God help thee to march on -- ward Tri -- umph -- ant to the last."

[lyrics.chorus]
text = "O church of God tri -- umph -- ant, with con -- flicts dear -- ly won, Be -- set with per -- se -- cu -- tion, Yet ev -- er march -- ing on."
