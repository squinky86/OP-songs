[lyrics.1]
text = "Each lit -- tle flow'r that op -- ens, Each lit -- tle bird that sings, He made their glow -- ing col -- ors, He made their ti -- ny wings."

[lyrics.2]
text = "The pur -- ple -- head -- ed moun -- tain, The riv -- er run -- ning by, The sun -- set and the morn -- ing That bright -- ens up the sky."

[lyrics.3]
text = "The cold wind in the win -- ter, The pleas -- ant sum -- mer sun, The ripe fruits in the gar -- den: He made them ev -- ery one."

[lyrics.4]
text = "He gave us eyes to see them, And lips that we might tell How great is God Al -- might -- y, Who has made all things well."

[lyrics.chorus]
text = "All things bright and beau -- ti -- ful, All crea -- tures great and small, All things wise and won -- der -- ful, The Lord God made them all."
