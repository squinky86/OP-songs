[lyrics.1]
text = "Break now the bread of life, dear Lord, to me, as once you broke the loaves be -- side the sea. Be -- yond the sa -- cred page I seek you, Lord; my spir -- it waits for you, O liv -- ing Word."

[lyrics.2]
text = "Bless your own word of truth, dear Lord, to me, as when you blessed the bread by Gal -- i -- lee. Then shall all bond -- age cease, all fet -- ters fall; and I shall find my peace, my All in all!"

[lyrics.3]
text = "You are the bread of life, dear Lord, to me, your ho -- ly word the truth that res -- cues me. Give me to eat and live with you a -- bove; teach me to love your truth, for you are love."

[lyrics.4]
text = "O send your Spir -- it now, dear Lord, to me, that he may touch my eyes and make me see. Show me the truth made plain with -- in your Word, for in your book re -- vealed I see you, Lord."
