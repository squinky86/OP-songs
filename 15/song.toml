[lyrics.1]
text = "Child -- hood's years are pass -- ing o'er us: Soon our school days will be done; Cares and sor -- rows lie be -- fore us, Hid -- den dan -- gers, snares un -- known."

[lyrics.2]
text = "Oh! may He, who, meek and low -- ly, Trod Him -- self this vale of woe, Make us His, and keep us ho -- ly, Guard and guide us while we go."

[lyrics.3]
text = "Hark! it is the Sav -- ior call -- ing: Lit -- tle chil -- dren, fol -- low Me! Je -- sus! keep our feet from fall -- ing; Teach us all to fol -- low Thee."

[lyrics.4]
text = "Soon we part, it may be nev -- er, Nev -- er here to meet a -- gain; Oh to meet in Heav'n for ev -- er! Oh, the crown of life to gain."
