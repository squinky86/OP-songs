[lyrics.1]
text = "When we walk with the Lord in the light of his word, what a glo -- ry he sheds on our way! While we do his good will, he a -- bides with us still, and with all who will trust and o -- bey."

[lyrics.2]
text = "Ev -- 'ry bur -- den we bear, ev -- 'ry sor -- row we share, all our toil he doth rich -- ly re -- pay. E -- ven grief, pain, and loss as we car -- ry a cross will be blessed as we trust and o -- bey."

[lyrics.3]
text = "But we nev -- er can prove the de -- lights of his love, un -- til all on the al -- tar we lay, for the fa -- favor he shows, and the joy he be -- stows, are for them who will trust and o -- bey."

[lyrics.4]
text = "Then in fel -- low -- ship sweet we will sit at his feet, or we'll walk by his side in the way. What he says we will do, where he sends we will go, nev -- er fear, on -- ly trust and o -- bey."

[lyrics.chorus]
text = "Trust and o -- bey, for there's no oth -- er way to be hap -- py in Je -- sus, but to trust and o -- bey."
