[lyrics.1]
text = "Oh, what a gift the Fa -- ther gave When He be -- stowed His Son! To save poor, ru -- ined, guilt -- y man, By sin de -- filed, un -- done."

[lyrics.2]
text = "For I was lost and vile in -- deed! To sin a will -- ing prey; 'Til God in mer -- cy in -- ter -- posed, And turned my night to day."

[lyrics.3]
text = "Now I can call the Sav -- iour mine, Though all un -- wor -- thy still; I'm shel -- tered by His pre -- cious blood, Be -- yond the reach of ill."

[lyrics.4]
text = "Come all who trust in Je -- sus now, And tell your joys a -- broad; Let thank -- ful hymns of praise as -- cend For Christ, the gift of God."

[lyrics.chorus]
text = "Oh, 'twas love, 'twas won -- drous love, The love of God to me! It brought my Sav -- iour from a -- bove To die on Cal -- va -- ry"
