[lyrics.1]
text = "As the life of a flow'r, As a breath or a sigh, So the years that we live As a dream has -- ten by; True, to -- day we are here, But to -- mor -- row may see Just a grave in the vale, And a mem -- 'ry of me."

[lyrics.2]
text = "As the life of a flow'r, Be our lives pure and sweet, May we bright -- en the way For the friends that we greet; And sweet in -- cense a -- rise, From our hearts as we live Close to Him who doth teach Us to love and for -- give."

[lyrics.3]
text = "While we tar -- ry be -- low Let us trust and a -- dore Him who leads us each day Tow'rd the ra -- di -- ant shore Where the sun nev -- er sets, And the flow'rs nev -- er fade, Where no sor -- row or death May its bor -- ders in -- vade."

[lyrics.chorus]
text = "As the life of a flow'r, As a breath, or a sigh, So the years glide a -- way, And a -- las, we must die."

[parts.Alto.lyrics.chorus]
