[lyrics.1]
text = "Ang -- ry words! O let them nev -- er, From the tongue un -- brid -- led slip, May the heart’s best im -- pulse ev -- er, Check them ere they soil the lip."

[lyrics.2]
text = "Love is much too pure and ho -- ly, Friend -- ship is too sac -- red far, For a mo -- ment’s reck -- less fol -- ly, Thus to de -- so -- late and mar."

[lyrics.3]
text = "Ang -- ry words are light -- ly spok -- en, Bit -- terest thoughts are rash -- ly stirred, Bright -- est links of life are brok -- en, By a sin -- gle ang -- ry word."

[lyrics.chorus]
text = "Love one a -- no -- ther thus saith the Sav -- ior, Child -- ren o -- bey the Fa -- ther’s blest com -- mand, Love one a -- no -- ther thus saith the Sav -- ior, Child -- ren o -- bey His blest com -- mand."

[parts.Tenor.lyrics.chorus]
text = """
"Love each oth -- er, love each oth -- er." 'Tis the Fa -- ther’s blest com -- mand, "Love each oth -- er, love each oth -- er." 'Tis His blest com -- mand.
"""

