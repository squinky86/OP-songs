[lyrics.1]
text = "There's not a place in earth's vast round, In o -- cean deep, or air, Where skill and wis -- dom are not found, For God is ev -- ery -- where."

[lyrics.2]
text = "A -- round, with -- in, be -- low, a -- bove, Wher -- ev -- er space ex -- tends, There heav'n dis -- plays its bound -- less love, And pow'r with mer -- cy blends."

[lyrics.3]
text = "Then rise, my soul, and sing his name, And all his praise re -- hearse, Who spread a -- broad earth's won -- drous frame, And built the u -- ni -- verse."

[lyrics.4]
text = "Wher -- e'er thine earth -- ly lot is cast, His pow'r and love de -- clare; Nor think the might -- y theme too vast, For God is ev -- ery -- where."
